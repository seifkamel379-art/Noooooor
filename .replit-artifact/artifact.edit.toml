kind = "web"
previewPath = "/"
title = "Noor Islamic App"
version = "1.0.0"

[[services]]
localPort = 5000
name = "web"
paths = ["/"]

[services.env]
PORT = "5000"
BASE_PATH = "/"

[services.development]
run = "npm run dev"

[services.production]
build = "npm run build"
serve = "static"
staticDir = "dist/public"
