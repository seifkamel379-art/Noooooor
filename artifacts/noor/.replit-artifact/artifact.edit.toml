kind = "web"
previewPath = "/"
title = "Noor - نور"
version = "1.0.0"
id = "artifacts/noor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24247

[services.development]
run = "pnpm --filter @workspace/noor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noor", "run", "build" ]
publicDir = "artifacts/noor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24247"
BASE_PATH = "/"
