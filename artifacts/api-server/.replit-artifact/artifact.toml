kind = "api"
previewPath = "/"
title = "Noor App"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "API Server"
paths = ["/"]

[services.development]
run = "pnpm -w run dev"

[services.production]
build = "npm run build && pnpm --filter @workspace/api-server run build"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.cjs"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/"
