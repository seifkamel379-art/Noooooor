kind = "api"
previewPath = "/"
title = "Noor App"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 19382
name = "API Server"
paths = ["/"]

[services.development]
run = "bash /home/runner/workspace/scripts/dev-artifact.sh"

[services.development.env]
PORT = "19382"
API_SERVER_PORT = "3001"

[services.production]
build = "npm run build && pnpm --filter @workspace/api-server run build"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.cjs"]

[services.production.run.env]
PORT = "8080"
