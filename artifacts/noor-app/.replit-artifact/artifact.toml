kind = "web"
previewPath = "/"
title = "تطبيق نُور"
version = "1.0.0"
id = "artifacts/noor-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19382
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/noor-app run dev"

[services.env]
PORT = "19382"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/noor-app", "run", "build"]
publicDir = "artifacts/noor-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
