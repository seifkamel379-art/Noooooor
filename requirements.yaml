packages:
  "framer-motion": "For smooth tab transitions, subha clicks, and slide-out menus"
  "date-fns": "For daily tracking, prayer time formatting, and date math"
  "lucide-react": "For beautiful icons throughout the app"
  "@radix-ui/react-dialog": "For accessible modals (tafsir, settings)"
  "@radix-ui/react-slider": "For audio player scrubber"
  "@radix-ui/react-slot": "For Radix UI primitives"
  "clsx": "For conditional tailwind classes"
  "tailwind-merge": "For conditional tailwind classes"

images:
  - path: "artifacts/noor-app/public/images/islamic-pattern.png"
    description: "Subtle, elegant Islamic geometric arabesque seamless pattern in warm cream and light golden tones, very low contrast, watermark style background"
    aspect_ratio: "1:1"

notes:
  - App is fully offline-first for tracking features (localStorage).
  - RTL direction is strictly enforced in Arabic.
  - Aladhan, AlQuran Cloud, and MP3Quran APIs are used for external data.
